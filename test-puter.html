<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Puter Test</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>body{font-family:system-ui;padding:24px;background:#070b12;color:#fff}button{padding:14px 18px;border-radius:12px;border:0;font-weight:800}#log{white-space:pre-wrap;margin-top:16px;color:#cbd5e1}img{max-width:100%;margin-top:20px;border-radius:16px}</style>
</head>
<body>
  <h1>Puter.js Test</h1>
  <button onclick="runTest()">Run Test Image</button>
  <div id="log"></div>
  <script>
    const log = (m) => document.getElementById('log').textContent += m + '
';
    async function runTest(){
      try{
        log('Checking Puter...');
        if(!window.puter || !puter.ai || !puter.ai.txt2img){ throw new Error('Puter.js not loaded'); }
        log('Generating test image...');
        const img = await puter.ai.txt2img('A tiny orange star on a dark background', {model:'gpt-image-1-mini', quality:'low', test_mode:true});
        document.body.appendChild(img);
        log('Success ✅');
      }catch(e){ log('Error: ' + (e.message || e)); }
    }
  </script>
</body>
</html>
